<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TouchLabs | Innovation within Reach</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1A2B3C;
            --accent-color: #007BFF;
            --bg-color: #F8F9FA;
            --text-color: #333;
            --light-text: #6C757D;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Apple SD Gothic Neo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        header {
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo-container img {
            max-width: 160px;
            height: auto;
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        main {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 4rem 2rem;
            text-align: center;
            background: radial-gradient(circle at 50% 50%, rgba(0, 123, 255, 0.03) 0%, rgba(248, 249, 250, 1) 70%);
        }

        .hero-content {
            max-width: 900px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1.2s forwards ease-out;
        }

        h1 {
            font-size: 4rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            letter-spacing: -2px;
        }

        p.tagline {
            font-size: 1.6rem;
            color: var(--light-text);
            margin-bottom: 3.5rem;
            font-weight: 300;
            word-break: keep-all;
        }

        .cta-button {
            display: inline-block;
            padding: 1.2rem 3rem;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,123,255,0.2);
        }

        .cta-button:hover {
            background-color: #0056b3;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,123,255,0.3);
        }

        .section {
            padding: 6rem 2rem;
            max-width: 1000px;
            margin: 0 auto;
        }

        .section h2 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        footer {
            padding: 4rem 2rem;
            background: white;
            text-align: center;
            border-top: 1px solid #eee;
        }

        .footer-links {
            margin-bottom: 2rem;
        }

        .footer-links a {
            color: var(--light-text);
            text-decoration: none;
            margin: 0 1.5rem;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: var(--accent-color);
        }

        .copyright {
            font-size: 0.85rem;
            color: #bbb;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.8rem; }
            p.tagline { font-size: 1.2rem; }
            header { padding: 1rem; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo-container">
            <img src="TouchLabs_Logo.png" alt="TouchLabs Logo">
        </div>
    </header>

    <main>
        <div class="hero-content">
            <h1>Innovation within Reach</h1>
            <p class="tagline">기술과 인간을 잇는 디지털 혁신의 중심, TouchLabs.<br>우리는 더 나은 사용자 경험을 위한 솔루션을 연구합니다.</p>
            <a href="mailto:contact@touchlabs.io" class="cta-button">프로젝트 문의하기</a>
        </div>
    </main>

    <section class="section">
        <h2>Our Vision</h2>
        <p>터치랩스는 단순한 기술 개발을 넘어, 사람의 감각과 디지털이 만나는 모든 순간을 더 가치 있게 만듭니다.</p>
    </section>

    <footer>
        <div class="footer-links">
            <a href="#">About</a>
            <a href="#">Services</a>
            <a href="#">Contact</a>
        </div>
        <p class="copyright">&copy; 2026 TouchLabs Inc. All rights reserved.</p>
    </footer>
</body>
</html>
