<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TouchLabs | 테크와 교육을 잇는 혁신</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --bg-color: #ffffff;
            --secondary-bg: #f8fafc;
            --text-color: #1e293b;
            --light-text: #64748b;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;
            word-break: keep-all;
        }

        header {
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo img { height: 60px; margin-top: 5px; }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 2rem;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--accent-color); }

        .hero {
            padding: 8rem 5%;
            background: linear-gradient(135deg, #f8fafc 0%, #eff6ff 100%);
            text-align: center;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--light-text);
            max-width: 800px;
            margin: 0 auto 3rem;
        }

        .section { padding: 8rem 5%; }
        .section-title {
            text-align: center;
            margin-bottom: 4rem;
        }
        .section-title h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }
        .section-title p { color: var(--light-text); font-size: 1.15rem; }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 2.5rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            border-color: var(--accent-color);
        }
        .card .icon { font-size: 2.5rem; margin-bottom: 1.5rem; }
        .card h3 { margin-bottom: 1.25rem; font-size: 1.6rem; color: var(--primary-color); }
        .card p.desc { color: var(--light-text); margin-bottom: 1.5rem; font-size: 1rem; }
        .card ul { list-style: none; color: var(--text-color); font-weight: 500; }
        .card li { margin-bottom: 0.75rem; padding-left: 1.5rem; position: relative; font-size: 0.95rem; }
        .card li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: var(--accent-color);
            font-weight: bold;
        }

        /* Kit Section */
        .kit-bg { background-color: var(--secondary-bg); }
        .kit-container { max-width: 1100px; margin: 0 auto; }
        .kit-item {
            display: flex;
            align-items: center;
            gap: 5rem;
            margin-bottom: 8rem;
        }
        .kit-item:last-child { margin-bottom: 0; }
        .kit-item:nth-child(even) { flex-direction: row-reverse; }
        .kit-text { flex: 1.2; }
        .kit-text h3 { font-size: 2rem; margin-bottom: 1.5rem; color: var(--primary-color); }
        .kit-text p { color: var(--light-text); font-size: 1.1rem; margin-bottom: 2rem; }
        .kit-tags { display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .tag {
            background: #eef2ff;
            color: #4338ca;
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        .kit-image {
            flex: 1;
            background: #e2e8f0;
            height: 400px;
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: #94a3b8;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
        }

        /* Profile Section */
        .profile {
            background: #f1f5f9;
            padding: 6rem 5%;
            text-align: center;
        }
        .profile-content {
            max-width: 800px;
            margin: 0 auto;
        }
        .profile h2 { font-size: 2.25rem; margin-bottom: 2rem; }
        .profile-info {
            background: white;
            padding: 3rem;
            border-radius: 24px;
            text-align: left;
            border: 1px solid var(--border-color);
        }
        .profile-info h4 { font-size: 1.25rem; margin-bottom: 1rem; color: var(--accent-color); border-bottom: 2px solid #eff6ff; display: inline-block; }
        .profile-info ul { list-style: none; margin-bottom: 2rem; }
        .profile-info li { margin-bottom: 0.5rem; color: var(--text-color); font-size: 1rem; }

        /* Inquiry Section */
        .inquiry-wrapper { padding: 6rem 5%; }
        .inquiry {
            background: var(--primary-color);
            color: white;
            text-align: center;
            border-radius: 40px;
            padding: 6rem 2rem;
            max-width: 1200px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        .inquiry h2 { font-size: 2.75rem; margin-bottom: 1.5rem; z-index: 1; position: relative; }
        .inquiry p { margin-bottom: 3.5rem; opacity: 0.85; font-size: 1.2rem; z-index: 1; position: relative; }
        .btn {
            display: inline-block;
            padding: 1.3rem 3.5rem;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            font-weight: 700;
            border-radius: 16px;
            transition: all 0.3s;
            z-index: 1;
            position: relative;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        footer {
            padding: 5rem 5%;
            text-align: center;
            color: var(--light-text);
            border-top: 1px solid var(--border-color);
            font-size: 0.95rem;
        }

        @media (max-width: 968px) {
            .hero h1 { font-size: 2.8rem; }
            .kit-item { flex-direction: column !important; gap: 3rem; text-align: center; }
            .kit-image { width: 100%; height: 300px; }
            .kit-tags { justify-content: center; }
        }
    
        /* Dropdown Styles */
        .dropdown { position: relative; display: inline-block; margin-left: 2rem; }
        .dropdown > a { margin-left: 0 !important; }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 140px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.1);
            z-index: 1001;
            border-radius: 8px;
            overflow: hidden;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 5px;
            border: 1px solid var(--border-color);
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a {
            color: var(--text-color);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            margin: 0 !important;
            font-size: 0.9rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background-color: var(--secondary-bg); color: var(--accent-color); }

        /* Hamburger Menu */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 28px;
            height: 20px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1100;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 2px;
            background-color: var(--text-color);
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        .hamburger.active span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        @media (max-width: 768px) {
            .hamburger { display: flex; }
            nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(255, 255, 255, 0.98);
                border-bottom: 1px solid var(--border-color);
                padding: 1rem 5%;
                flex-direction: column;
                align-items: flex-start;
                box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            }
            nav.open { display: flex; }
            nav a {
                margin-left: 0;
                padding: 0.75rem 0;
                font-size: 1rem;
                width: 100%;
                border-bottom: 1px solid var(--border-color);
            }
            nav a:last-child { border-bottom: none; }
            .dropdown {
                display: block;
                margin-left: 0;
                width: 100%;
            }
            .dropdown > a {
                padding: 0.75rem 0;
                display: block;
                width: 100%;
                border-bottom: 1px solid var(--border-color);
            }
            .dropdown-content {
                position: static;
                display: none;
                transform: none;
                box-shadow: none;
                border: none;
                border-radius: 0;
                padding-left: 1rem;
                background: var(--secondary-bg);
            }
            .dropdown.open .dropdown-content { display: block; }
            .dropdown:hover .dropdown-content { display: none; }
            .dropdown.open .dropdown-content { display: block; }
            .dropdown-content a {
                text-align: left;
                padding: 0.6rem 0;
                font-size: 0.9rem;
                border-bottom: 1px solid var(--border-color);
            }
            .dropdown-content a:last-child { border-bottom: none; }
        }

    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html"><img src="TouchLabs_Logo.png" alt="TouchLabs Logo"></a>
        </div>
        <button class="hamburger" id="hamburger" aria-label="메뉴 열기" aria-expanded="false">
            <span></span><span></span><span></span>
        </button>
        <nav id="main-nav">
            <a href="index.html">홈</a>
            <a href="company.html">회사 소개</a>
            <div class="dropdown" id="nav-dropdown">
                <a href="solution.html">솔루션</a>
                <div class="dropdown-content">
                    <a href="solution.html#curriculum">교육 커리큘럼</a>
                    <a href="solution.html#kits">교육 키트</a>
                </div>
            </div>
            <a href="resources.html">자료실</a>
            <a href="contact.html">문의</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h1>손끝에서 시작되는<br>기술의 실체, 터치랩스</h1>
            <p>단순한 코딩 교육을 넘어 하드웨어 설계, 클라우드 연동, AI 모델링까지<br>실제 제품이 만들어지는 전 과정을 경험하는 테크니컬 마스터 클래스입니다.</p>
            <a href="#inquiry" class="btn">교육 파트너십 문의</a>
        </section>








    </main>

    <footer_contents_placeholder>

    <!-- Netlify Form Detection -->
    <div hidden>
        <form name="contact" method="POST" data-netlify="true">
            <input type="hidden" name="form-name" value="contact" />
            <input type="hidden" name="subject" />
            <div class="form-group">
                <label for="name">이름</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="company">회사/소속</label>
                <input type="text" id="company" name="company">
            </div>
            <div class="form-group">
                <label>문의 종류</label>
                <input type="radio" name="inquiry_type" value="교육" checked>
                <input type="radio" name="inquiry_type" value="키트">
                <input type="radio" name="inquiry_type" value="일반">
            </div>
            <div class="form-group">
                <label for="email">이메일</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="phone">연락처 (선택)</label>
                <input type="tel" id="phone" name="phone">
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 TouchLabs. All Rights Reserved.</p>
        <p>대표: 양선제 | 사업자등록번호: 459-10-02927</p>
        <p>주소: 경기도 화성시 효행로 봉담읍 | 연락처: touchlabs@touchlabs.kr</p>
    </footer>

    <!-- Forcing Netlify cache clear -->
    <script>
        const hamburger = document.getElementById('hamburger');
        const mainNav = document.getElementById('main-nav');
        const navDropdown = document.getElementById('nav-dropdown');

        hamburger.addEventListener('click', function() {
            const isOpen = mainNav.classList.toggle('open');
            hamburger.classList.toggle('active', isOpen);
            hamburger.setAttribute('aria-expanded', isOpen);
            if (!isOpen) navDropdown.classList.remove('open');
        });

        if (navDropdown) {
            navDropdown.querySelector('a').addEventListener('click', function(e) {
                if (window.innerWidth <= 768) {
                    e.preventDefault();
                    navDropdown.classList.toggle('open');
                }
            });
        }

        document.addEventListener('click', function(e) {
            if (!hamburger.contains(e.target) && !mainNav.contains(e.target)) {
                mainNav.classList.remove('open');
                hamburger.classList.remove('active');
                hamburger.setAttribute('aria-expanded', 'false');
                if (navDropdown) navDropdown.classList.remove('open');
            }
        });
    </script>
</body>
</html>
