<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문의하기 | TouchLabs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --bg-color: #ffffff;
            --secondary-bg: #f8fafc;
            --text-color: #1e293b;
            --light-text: #64748b;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.7;
        }

        header {
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo img { height: 60px; margin-top: 5px; }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 2rem;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--accent-color); }

        .page-title {
            background-color: var(--secondary-bg);
            padding: 4rem 5%;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        
        .page-title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }
        
        .page-title p {
            font-size: 1.15rem;
            color: var(--light-text);
        }

        .contact-form-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 3rem;
            background-color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Pretendard', sans-serif;
        }

        .form-group textarea {
            min-height: 150px;
            resize: vertical;
        }

        .submit-btn {
            display: inline-block;
            width: 100%;
            padding: 1rem;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 0.2s;
            text-align: center;
            border: none;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #2563eb;
        }

        .radio-group {
            display: flex;
            gap: 1.5rem;
            padding-top: 0.5rem;
        }
        .radio-group label {
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        footer {
            padding: 5rem 5%;
            text-align: center;
            color: var(--light-text);
            border-top: 1px solid var(--border-color);
            font-size: 0.95rem;
        }
    
        /* Dropdown Styles added by Homepage Manager */
        .dropdown { position: relative; display: inline-block; margin-left: 2rem; }
        .dropdown > a { margin-left: 0 !important; }
        .dropdown-content {
            display: none;
            position: absolute;
            background-color: white;
            min-width: 140px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.1);
            z-index: 1001;
            border-radius: 8px;
            overflow: hidden;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            margin-top: 5px;
            border: 1px solid var(--border-color);
        }
        .dropdown:hover .dropdown-content { display: block; }
        .dropdown-content a {
            color: var(--text-color);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            margin: 0 !important;
            font-size: 0.9rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        .dropdown-content a:last-child { border-bottom: none; }
        .dropdown-content a:hover { background-color: var(--secondary-bg); color: var(--accent-color); }

    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html"><img src="TouchLabs_Logo.png" alt="TouchLabs Logo"></a>
        </div>
        <nav>
            <a href="index.html">홈</a>
            <a href="company.html">회사 소개</a>
            <div class="dropdown">
                <a href="solution.html">솔루션</a>
                <div class="dropdown-content">
                    <a href="solution.html#curriculum">교육 커리큘럼</a>
                    <a href="kits.html">교육 키트</a>
                </div>
            </div>
            <a href="resources.html">자료실</a>
            <a href="contact.html">문의</a>
        </nav>
    </header>

    <main>
        <div class="page-title">
            <h1>교육 문의</h1>
            <p>궁금한 점이 있으신가요? 언제든지 편하게 문의해주세요.</p>
        </div>
        
        <div class="contact-form-container">
            <form name="contact" method="POST" data-netlify="true">
                <input type="hidden" name="form-name" value="contact" />
                <input type="hidden" name="subject" />
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="company">회사/소속</label>
                    <input type="text" id="company" name="company">
                </div>
                <div class="form-group">
                    <label>문의 종류</label>
                    <div class="radio-group">
                        <label><input type="radio" name="inquiry_type" value="교육" checked> 교육</label>
                        <label><input type="radio" name="inquiry_type" value="키트"> 키트</label>
                        <label><input type="radio" name="inquiry_type" value="일반"> 일반</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">연락처 (선택)</label>
                    <input type="tel" id="phone" name="phone">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TouchLabs. All Rights Reserved.</p>
        <p>대표: 양선제 | 사업자등록번호: 459-10-02927</p>
        <p>주소: 경기도 화성시 효행로 봉담읍 | 연락처: touchlabs@touchlabs.kr</p>
    </footer>

    <script>
        const form = document.querySelector('form[name="contact"]');
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            // Dynamically set the subject line
            const inquiryType = form.querySelector('input[name="inquiry_type"]:checked').value;
            const subjectField = form.querySelector('input[name="subject"]');
            subjectField.value = `[터치랩스]홈페이지의 새로운 [${inquiryType}] 문의`;

            const formData = new FormData(form);
            const submitButton = form.querySelector('button[type="submit"]');
            const originalButtonText = submitButton.textContent;
            submitButton.textContent = '전송 중...';
            submitButton.disabled = true;

            fetch('/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: new URLSearchParams(formData).toString()
            })
            .then(() => {
                alert('문의가 성공적으로 전송되었습니다.');
                form.reset();
            })
            .catch((error) => {
                alert('오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
                console.error(error);
            })
            .finally(() => {
                submitButton.textContent = originalButtonText;
                submitButton.disabled = false;
            });
        });
    </script>
</body>
</html>
