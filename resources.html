<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자료실 | TouchLabs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #0f172a;
            --accent-color: #3b82f6;
            --bg-color: #ffffff;
            --secondary-bg: #f8fafc;
            --text-color: #1e293b;
            --light-text: #64748b;
            --border-color: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--secondary-bg);
            color: var(--text-color);
            line-height: 1.7;
        }

        header {
            padding: 1rem 5%;
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .logo img { height: 60px; margin-top: 5px; }

        nav a {
            text-decoration: none;
            color: var(--text-color);
            margin-left: 2rem;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover { color: var(--accent-color); }
        
        .page-title {
            background-color: var(--bg-color);
            padding: 4rem 5%;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }
        
        .page-title h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .resource-container {
            max-width: 1100px;
            margin: 4rem auto;
            padding: 0 2rem;
            background-color: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
        }

        .resource-table {
            width: 100%;
            border-collapse: collapse;
        }

        .resource-table th, .resource-table td {
            padding: 1.25rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .resource-table thead {
            background-color: #f8fafc;
        }
        
        .resource-table th {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--light-text);
            font-weight: 600;
        }
        
        .resource-table tbody tr:last-child td {
            border-bottom: none;
        }

        .resource-table td.number { text-align: center; color: var(--light-text); font-weight: 500; }
        .resource-table td.title { font-weight: 600; color: var(--primary-color); }
        .resource-table td.date { color: var(--light-text); }
        
        .download-btn {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: var(--accent-color);
            color: white;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: background-color 0.2s;
            text-align: center;
            font-size: 0.9rem;
        }

        .download-btn:hover {
            background-color: #2563eb;
        }

        footer {
            padding: 5rem 5%;
            text-align: center;
            color: var(--light-text);
            background-color: var(--bg-color);
            border-top: 1px solid var(--border-color);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <a href="index.html"><img src="TouchLabs_Logo.png" alt="TouchLabs Logo"></a>
        </div>
        <nav>
            <a href="index.html">홈</a>
            <a href="company.html">회사 소개</a>
            <a href="solution.html">솔루션</a>
            <a href="resources.html">자료실</a>
            <a href="contact.html">문의</a>
        </nav>
    </header>

    <main>
        <div class="page-title">
            <h1>자료실</h1>
        </div>
        
        <div class="resource-container">
            <table class="resource-table">
                <thead>
                    <tr>
                        <th style="width: 10%; text-align: center;">번호</th>
                        <th style="width: 50%;">제목 및 설명</th>
                        <th style="width: 20%;">작성일</th>
                        <th style="width: 20%; text-align: center;">다운로드</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 게시물 #1 -->
                    <tr>
                        <td class="number">1</td>
                        <td class="title"><strong>터치랩스(TouchLabs)의 자료실입니다</strong><br><span style="font-size: 0.9em; color: #64748b;">게시판 테스트</span></td>
                        <td class="date">2026-03-21</td>
                        <td style="text-align: center;"><a href="https://docs.google.com/document/d/1q_Xvha5QQYSlqP02EOCi5_Z-Ki3lx-PXL_v0gpHqkBo/edit?usp=drivesdk" target="_blank" class="download-btn">다운로드</a></td>
                    </tr>
                    <!-- 실제 자료는 여기에 추가됩니다 -->
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 TouchLabs. All Rights Reserved.</p>
        <p>대표: 양선제 | 사업자등록번호: 459-10-02927</p>
        <p>주소: 경기도 화성시 효행로 봉담읍 | 연락처: touchlabs@touchlabs.kr</p>
    </footer>
</body>
</html>
